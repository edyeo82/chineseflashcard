<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Firebase Test - Chinese Flashcards</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f7fb;color:#202126;padding:24px;text-align:center}
    .box{background:#fff;border:1px solid #dfe1e8;border-radius:20px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);max-width:520px}
    .error{color:#9b1c1c;font-weight:700;white-space:pre-wrap;text-align:left}
  </style>
</head>
<body>
  <div class="box" id="status">Loading Firebase test version...</div>
  <script>
    const url = 'https://raw.githubusercontent.com/edyeo82/chineseflashcard/firebase-save-modes/index.html?cacheBust=' + Date.now();
    fetch(url, { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error('Could not load test version: HTTP ' + r.status);
        return r.text();
      })
      .then(html => {
        html = html.replace('<head>', '<head><base href="../">');
        html = html.replace('</body>', `
<script>
(function(){
  function esc(v){return String(v||'').replace(/[&<>]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[ch];});}
  function childId(){var child=document.getElementById('child');return child ? child.value.replace(/[^a-zA-Z0-9]+/g,'_') : 'Child_1';}
  function storageInfo(){
    var status=document.getElementById('saveStatus');
    var text=status ? status.textContent : '';
    var child=childId();
    var username=text.match(/Simple username \\(([^)]+)\\)/);
    if(username){return {mode:'username',username:username[1],title:'Current store: Firestore username store',path:'publicUsers / '+username[1]+' / children / '+child+' / progress',note:'Shared cloud progress. Anyone who uses the same username can change this progress.'};}
    if(/Signed in as/i.test(text)){return {mode:'auth',title:'Current store: Firestore private signed-in store',path:'users / <your Firebase Auth UID> / children / '+child+' / progress',note:'Private cloud progress. Find the exact UID under Firebase Authentication → Users.'};}
    return {mode:'guest',title:'Current store: Guest local browser store',path:'Browser localStorage only. No Firestore document is written.',note:'This progress stays on this device/browser only.'};
  }
  function updateStorePanel(){
    var savePanel=document.getElementById('savePanel');if(!savePanel) return;
    var panel=document.getElementById('storePathPanel');
    if(!panel){panel=document.createElement('div');panel.id='storePathPanel';panel.style.cssText='margin-top:10px;border:2px solid #3159df;background:#eef2ff;border-radius:14px;padding:11px 13px;font-size:13px;line-height:1.45;text-align:left';savePanel.appendChild(panel);}
    var info=storageInfo();
    panel.innerHTML='<b>'+esc(info.title)+'</b><br><code style="display:block;margin-top:5px;white-space:normal;word-break:break-word;background:#fff;border:1px solid #dfe1e8;border-radius:8px;padding:6px">'+esc(info.path)+'</code><div style="margin-top:6px;color:#656b78">'+esc(info.note)+'</div>';
  }
  window.__hclStorageInfo=storageInfo;window.__hclUpdateStorePanel=updateStorePanel;
  setInterval(updateStorePanel,800);document.addEventListener('change',updateStorePanel,true);document.addEventListener('click',function(){setTimeout(updateStorePanel,100);},true);updateStorePanel();
})();
<\/script>
<script type="module">
import { getApps } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { getFirestore, collection, doc, getDocs, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
function esc(v){return String(v||'').replace(/[&<>]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[ch];});}
function childId(){var child=document.getElementById('child'); return child ? child.value.replace(/[^a-zA-Z0-9]+/g,'_') : 'Child_1';}
function progressDocId(level,lesson,char){return [level,lesson,char].map(function(x){return encodeURIComponent(String(x));}).join('__');}
function usernameOk(v){return /^[a-zA-Z0-9_-]{3,30}$/.test(v||'');}
function getFirebase(){var apps=getApps(); if(!apps.length) return null; var app=apps[0]; return {auth:getAuth(app), db:getFirestore(app)};}
function parseLocalKey(key){var prefix='hcl:progress:v31:'+childId()+':';if(!key.startsWith(prefix)) return null;var rest=key.slice(prefix.length);var parts=rest.split(':');if(parts.length<3) return null;return {level:parts[0],lesson:parts[1],char:parts.slice(2).join(':')};}
function localProgressRows(){var rows=[];for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i);var p=parseLocalKey(key);if(!p) continue;var status=localStorage.getItem(key);if(status!=='known'&&status!=='again') continue;rows.push({id:progressDocId(p.level,p.lesson,p.char),status:status,known:status==='known',char:p.char,pinyin:'',level:p.level,lesson:p.lesson,child:childId()});}return rows;}
function currentCloudTarget(){var fb=getFirebase();if(!fb) return null;var info=window.__hclStorageInfo ? window.__hclStorageInfo() : {mode:'guest'};if(info.mode==='username'&&usernameOk(info.username)) return {label:'username '+info.username,path:['publicUsers',info.username,'children',childId(),'progress'],auth:fb.auth,db:fb.db};if(info.mode==='auth'&&fb.auth.currentUser) return {label:'signed-in account '+(fb.auth.currentUser.email||fb.auth.currentUser.uid),path:['users',fb.auth.currentUser.uid,'children',childId(),'progress'],auth:fb.auth,db:fb.db};return null;}
async function writeRows(db,path,rows){for(const row of rows){await setDoc(doc(db,...path,row.id),Object.assign({},row,{updatedAt:serverTimestamp(),copiedAt:serverTimestamp()}),{merge:true});}}
async function readRows(db,path){const snap=await getDocs(collection(db,...path));const rows=[];snap.forEach(function(d){rows.push(Object.assign({id:d.id},d.data()||{}));});return rows;}
function setCopyStatus(msg,bad){var el=document.getElementById('copyStatus');if(el) el.innerHTML=bad?'<span style="color:#9b1c1c;font-weight:700">'+esc(msg)+'</span>':esc(msg);}
function addCopyPanel(){
  var savePanel=document.getElementById('savePanel');if(!savePanel||document.getElementById('copyPanel')) return;
  var panel=document.createElement('div');panel.id='copyPanel';panel.style.cssText='margin-top:10px;border:2px solid #7ac98a;background:#f0fff4;border-radius:14px;padding:11px 13px;font-size:13px;line-height:1.45;text-align:left';
  panel.innerHTML='<b>Copy progress / move profile</b><div style="margin-top:6px;color:#656b78">Use this when a child starts as Guest, then wants to continue on another device using a username or sign-in account.</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px"><button class="uiBtn ghost" id="copyGuestToCloud">Copy Guest on this device → current cloud store</button><button class="uiBtn ghost" id="copyCloudToGuest">Copy current cloud store → Guest on this device</button></div><div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px"><input id="copyFromUsername" placeholder="Source username to import into signed-in account"><button class="uiBtn ghost" id="copyUsernameToAuth">Import username → signed-in account</button></div><div id="copyStatus" style="margin-top:8px;color:#656b78">Copy uses the currently selected child only.</div>';
  savePanel.appendChild(panel);
  document.getElementById('copyGuestToCloud').onclick=async function(){try{var target=currentCloudTarget();if(!target){setCopyStatus('Switch to Simple username or sign in first, then run this copy.',true);return;}var rows=localProgressRows();if(!rows.length){setCopyStatus('No Guest progress found for '+childId()+'.',true);return;}setCopyStatus('Copying '+rows.length+' progress records to '+target.label+'...');await writeRows(target.db,target.path,rows);setCopyStatus('Copied '+rows.length+' records to '+target.label+'. Reloading to show copied cloud progress...');setTimeout(function(){location.reload();},900);}catch(e){console.error(e);setCopyStatus('Copy failed: '+(e.message||e),true);}};
  document.getElementById('copyCloudToGuest').onclick=async function(){try{var target=currentCloudTarget();if(!target){setCopyStatus('Switch to Simple username or sign in first, then run this copy.',true);return;}setCopyStatus('Reading current cloud progress from '+target.label+'...');var rows=await readRows(target.db,target.path);if(!rows.length){setCopyStatus('No cloud progress found for '+target.label+' and '+childId()+'.',true);return;}rows.forEach(function(row){if(!row.level||!row.lesson||!row.char||!row.status) return;localStorage.setItem('hcl:progress:v31:'+childId()+':'+row.level+':'+row.lesson+':'+row.char,row.status);});localStorage.setItem('hcl:saveMode','guest');setCopyStatus('Copied '+rows.length+' records to Guest on this device. Reloading in Guest mode...');setTimeout(function(){location.reload();},900);}catch(e){console.error(e);setCopyStatus('Copy failed: '+(e.message||e),true);}};
  document.getElementById('copyUsernameToAuth').onclick=async function(){try{var fb=getFirebase();if(!fb){setCopyStatus('Firebase is still loading. Try again in a few seconds.',true);return;}var source=(document.getElementById('copyFromUsername').value||'').trim().toLowerCase();if(!usernameOk(source)){setCopyStatus('Source username must be 3-30 letters/numbers/_/-.',true);return;}if(!fb.auth.currentUser){setCopyStatus('Sign in first. Then import the username into your signed-in account.',true);return;}var sourcePath=['publicUsers',source,'children',childId(),'progress'];var destPath=['users',fb.auth.currentUser.uid,'children',childId(),'progress'];setCopyStatus('Importing from username '+source+' into '+(fb.auth.currentUser.email||fb.auth.currentUser.uid)+'...');var rows=await readRows(fb.db,sourcePath);if(!rows.length){setCopyStatus('No progress found under username '+source+' for '+childId()+'.',true);return;}await writeRows(fb.db,destPath,rows);localStorage.setItem('hcl:saveMode','auth');setCopyStatus('Imported '+rows.length+' records into your signed-in account. Reloading...');setTimeout(function(){location.reload();},900);}catch(e){console.error(e);setCopyStatus('Import failed: '+(e.message||e),true);}};
}
setInterval(addCopyPanel,800);addCopyPanel();
<\/script>
</body>`);
        document.open();
        document.write(html);
        document.close();
      })
      .catch(err => {
        document.getElementById('status').innerHTML = '<div class="error">' + String(err.message || err).replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch])) + '</div>';
      });
  </script>
</body>
</html>
