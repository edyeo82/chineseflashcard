<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Higher Chinese Flashcards</title>
<style>
:root{--bg:#f7f7fb;--ink:#202126;--muted:#656b78;--line:#dfe1e8;--accent:#3159df;--good:#eaf8ef;--bad:#fff0f0;--shadow:0 8px 24px rgba(0,0,0,.06)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;touch-action:manipulation;-webkit-text-size-adjust:100%}body{font-family:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink)}header{text-align:center;padding:18px 12px 8px}h1{margin:0;font-size:clamp(28px,5vw,46px)}.wrap{width:min(780px,94vw);margin:0 auto 34px}.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px 18px;box-shadow:var(--shadow)}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;font-size:16px;background:#fff;color:var(--ink)}.card{position:relative;margin:18px auto 14px;min-height:410px;width:100%;background:#fff;border:1px solid var(--line);border-radius:28px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 48px;box-shadow:var(--shadow);cursor:pointer;user-select:none;touch-action:pan-y;-webkit-tap-highlight-color:transparent;transition:transform .2s ease;overflow:hidden}.badge{display:inline-block;padding:6px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:#fff;font-size:12px;margin-bottom:18px}.wordStage{min-height:145px;width:100%;display:flex;align-items:center;justify-content:center}.charText{font-size:clamp(100px,30vw,220px);line-height:1;font-weight:700}.answerSlot{min-height:180px;width:100%}.pinyin{margin-top:8px;font-size:clamp(28px,6vw,48px);color:var(--accent);line-height:1.25}.otherPinyin{margin-top:4px;font-size:clamp(14px,3.5vw,18px);color:var(--muted)}.helperBox{margin:14px auto 0;max-width:620px;text-align:left}.helperItem{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:#fafafa}.helperText{font-size:clamp(22px,5vw,34px);font-weight:700}.helperMeta{font-size:15px;color:var(--muted);margin-top:4px;line-height:1.35}.navArrow{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:62px;border:0;background:transparent;cursor:pointer;color:#b5b7c3;font-size:32px;z-index:3;border-radius:14px}.navArrow:active{background:rgba(0,0,0,.05);color:#666}.navArrow.left{left:8px}.navArrow.right{right:8px}.swipeFeedback{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;z-index:4;pointer-events:none;padding:12px 16px;border-radius:16px;font-size:clamp(24px,6vw,40px);font-weight:700;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.15)}.swipeFeedback.show{opacity:.95}.swipeFeedback.known{background:#eaf8ed;color:#17642b;border:2px solid #7ac98a}.swipeFeedback.again{background:#fff0f0;color:#8a2727;border:2px solid #e59696}.toolbar{display:flex;flex-direction:column;align-items:center;gap:10px;margin:2px auto 12px}.toolbarRow{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;width:100%}.segmented{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:18px;padding:6px;box-shadow:var(--shadow);gap:6px}.uiBtn{border:0;background:transparent;color:var(--ink);cursor:pointer;border-radius:14px;min-height:56px;padding:10px 16px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:600}.uiBtn.primary{background:var(--accent);color:#fff;min-width:128px}.uiBtn.success{background:var(--good);color:#145a2a;border:1px solid #cfe9d6;min-width:210px}.uiBtn.ghost{border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}.smallNote{text-align:center;color:var(--muted);font-size:13px;line-height:1.4}details{margin-top:12px}summary{cursor:pointer;font-weight:700;padding:8px 0}.list{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}.item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;line-height:1.35}.item b{font-size:34px}.miniBtn{margin-top:8px;padding:6px 10px;font-size:13px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:#fff0f0}.error{color:#9b1c1c;font-weight:700}@media(max-width:640px){.controls{grid-template-columns:1fr}.card{min-height:390px;padding-left:44px;padding-right:44px}.segmented{width:100%}.segmented .uiBtn{flex:1;min-width:0;padding-left:8px;padding-right:8px}.uiBtn.success{width:100%}.navArrow{width:30px;height:54px;font-size:28px}}
</style>
</head>
<body>
<header><h1>Higher Chinese Flashcards</h1></header>
<main class="wrap">
<section class="panel"><div class="controls"><div><label>Child</label><select id="child"><option>Child 1</option><option>Child 2</option><option>Child 3</option><option>Child 4</option><option>Child 5</option></select></div><div><label>Level</label><select id="level"></select></div><div><label>Lesson</label><select id="lesson"></select></div></div></section>
<section id="card" class="card"></section>
<section class="toolbar"><div class="toolbarRow"><div class="segmented"><button class="uiBtn" id="prev">‹ Previous</button><button class="uiBtn primary" id="flip">👁 <span id="flipLabel">Reveal</span></button><button class="uiBtn" id="next">Next ›</button></div></div><div class="toolbarRow"><button class="uiBtn success" id="know">✓ Know this &amp; remove</button><button class="uiBtn ghost" id="shuffle">↻ Shuffle</button><button class="uiBtn ghost" id="unshuffle">⇅ Unshuffle</button></div><div class="smallNote">Tap card = reveal · Tap small arrows or buttons = previous / next · Swipe right = know · Swipe left = don’t know</div></section>
<section class="panel"><details><summary>Known characters for selected child</summary><div class="list" id="knownList"></div></details><details><summary>Current practice characters</summary><div class="list" id="list"></div></details></section>
</main>
<script>
const OLD_DATA_URL='https://raw.githubusercontent.com/edyeo82/chineseflashcard/f8373730fbbb589cc50efa19cd54b736fdf697f6/index.html';
let sourceData={},sourceCards=[],exampleCards=[],readingMap=new Map(),allCards=[],cards=[],index=0,revealed=false,storageOK=false,suppressClick=false,dragActive=false,startX=0,startY=0,currentDX=0,isShuffled=false;
const $=id=>document.getElementById(id);
function esc(v){return String(v||'').replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));}
function testStorage(){try{localStorage.setItem('hcl:storageTest','1');localStorage.removeItem('hcl:storageTest');storageOK=true}catch(e){storageOK=false}}
function safeGet(k){try{return localStorage.getItem(k)}catch(e){return null}}function safeSet(k,v){try{localStorage.setItem(k,v);storageOK=true}catch(e){storageOK=false}}
function childId(){return $('child').value.replace(/[^a-zA-Z0-9]+/g,'_')}function appKey(n){return n==='child'?'hcl:app:child':`hcl:app:${childId()}:${n}`}function progressKey(c){return `hcl:progress:v27:${childId()}:${c.level}:${c.lesson}:${c.text}`}
function chineseChars(s){return Array.from(String(s).matchAll(/[\u3400-\u9FFF]/g)).map(m=>m[0])}
function addReading(ch,p){if(!ch||!p)return;if(!readingMap.has(ch))readingMap.set(ch,new Set());readingMap.get(ch).add(p)}
function sourceUrls(){return [OLD_DATA_URL]}
async function loadSource(){let parsed=null;for(const url of sourceUrls()){try{const main=await fetch(url,{cache:'no-store'}).then(r=>r.text());const marker='const flashcardData = ';const start=main.indexOf(marker);if(start<0)continue;const after=main.slice(start+marker.length);const end=after.indexOf('};');if(end<0)continue;parsed=JSON.parse(after.slice(0,end+1));break}catch(e){}}if(!parsed)throw new Error('Could not load flashcard data.');sourceData=parsed;let order=0;Object.entries(sourceData).forEach(([level,lessons])=>Object.entries(lessons).forEach(([lesson,arr])=>arr.forEach((x,i)=>{order++;sourceCards.push({level,lesson,text:x.char,pinyin:x.pinyin||'',order,suborder:i});addReading(x.char,x.pinyin||'')})));let helpers=[];try{helpers=await fetch('hcl-words/helpers.json',{cache:'no-store'}).then(r=>r.json())}catch(e){helpers=[]}exampleCards=helpers.map(([text,pinyin,meaning])=>({text,pinyin,meaning,chars:chineseChars(text),curated:true})).filter(x=>x.text&&x.chars.length)}
function populateLevels(){$('level').innerHTML=Object.keys(sourceData).map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('')}
function populateLessons(){const level=$('level').value;const lessons=sourceData[level]?Object.keys(sourceData[level]):[];$('lesson').innerHTML='<option value="All Lessons">All Lessons</option>'+lessons.map(l=>`<option value="${esc(l)}">${esc(l)}</option>`).join('')}
function selectIfExists(id,val){if(val&&Array.from($(id).options).some(o=>o.value===val))$(id).value=val}
function restoreSelections(){selectIfExists('child',safeGet(appKey('child')));selectIfExists('level',safeGet(appKey('level')));populateLessons();selectIfExists('lesson',safeGet(appKey('lesson')))}function restoreLessonForChild(){selectIfExists('level',safeGet(appKey('level')));populateLessons();selectIfExists('lesson',safeGet(appKey('lesson')))}function saveSelections(){safeSet(appKey('child'),$('child').value);safeSet(appKey('level'),$('level').value);safeSet(appKey('lesson'),$('lesson').value)}
function selectedEntries(){const level=$('level').value,lesson=$('lesson').value;return sourceCards.filter(x=>x.level===level&&(lesson==='All Lessons'||x.lesson===lesson))}
function lessonEntries(c){return sourceCards.filter(x=>x.level===c.level&&x.lesson===c.lesson).sort((a,b)=>a.order-b.order||a.suborder-b.suborder)}
function pack(xs){return {text:xs.map(x=>x.text).join(''),pinyin:xs.map(x=>x.pinyin).join(' '),meaning:''}}
function lessonGeneratedExample(c){const arr=lessonEntries(c);const i=arr.findIndex(x=>x.order===c.order);if(i<0)return null;const p=arr[i-1],n=arr[i+1],p2=arr[i-2],n2=arr[i+2];if(n)return pack([c,n]);if(p)return pack([p,c]);if(n&&n2)return pack([c,n,n2]);if(p&&n)return pack([p,c,n]);if(p2&&p)return pack([p2,p,c]);return null}
function examplesForCard(c){const hits=exampleCards.filter(h=>h.chars.includes(c.text)).sort((a,b)=>a.text.length-b.text.length||a.text.localeCompare(b.text));return [hits[0]||lessonGeneratedExample(c)].filter(Boolean)}
function otherPinyinFor(c){const arr=Array.from(readingMap.get(c.text)||[]).filter(p=>p&&p!==c.pinyin);return arr.length?`<div class="otherPinyin">其他读音: ${arr.map(esc).join(' / ')}</div>`:''}
function buildCards(i=0){saveSelections();allCards=selectedEntries();cards=allCards.filter(x=>safeGet(progressKey(x))!=='known');if(!isShuffled)orderCards(false);index=Math.min(Math.max(i,0),Math.max(cards.length-1,0));revealed=false;render()}
function orderCards(doRender=true){cards.sort((a,b)=>a.order-b.order||a.suborder-b.suborder||a.text.localeCompare(b.text));isShuffled=false;index=0;revealed=false;if(doRender)render()}
function updateToolbar(){$('flipLabel').textContent=revealed?'Hide':'Reveal'}function arrows(){return '<button class="navArrow left" id="edgePrev">‹</button><button class="navArrow right" id="edgeNext">›</button>'}
function renderExamples(c){const h=examplesForCard(c)[0];if(!h)return '';return `<div class="helperBox"><div class="helperItem"><div class="helperText">${esc(h.text)}</div><div class="helperMeta">${esc(h.pinyin)}${h.meaning?' · '+esc(h.meaning):''}</div></div></div>`}
function render(){updateToolbar();const card=$('card');if(!sourceCards.length){card.innerHTML='<div class="error" style="margin:auto 0;">Loading lesson characters...</div>';return}if(!allCards.length){card.innerHTML=arrows()+'<div style="margin:auto 0;">No characters found for this lesson.</div>';bindArrows();$('list').innerHTML='';renderKnownList();return}if(!cards.length){card.innerHTML=arrows()+'<div style="margin:auto 0;">All characters in this selection are marked as known.<br><br>Open Known characters below to move any card back to practice.</div>';bindArrows();$('list').innerHTML='<div class="item">No active practice characters.</div>';renderKnownList();return}const c=cards[index];card.style.transform='';card.innerHTML=`${arrows()}<div id="swipeFeedback" class="swipeFeedback"></div><span class="badge">${index+1} / ${cards.length} · ${esc(c.level)} · ${esc(c.lesson)}</span><div class="wordStage"><div class="charText">${esc(c.text)}</div></div><div class="answerSlot">${revealed?`<div class="pinyin">${esc(c.pinyin)}</div>${otherPinyinFor(c)}${renderExamples(c)}`:''}</div>`;bindArrows();renderList()}
function bindArrows(){const p=$('edgePrev'),n=$('edgeNext');if(p)p.onclick=e=>{e.stopPropagation();next(-1)};if(n)n.onclick=e=>{e.stopPropagation();next(1)}}
function renderList(){$('list').innerHTML=cards.map(c=>`<div class="item"><b>${esc(c.text)}</b><br><small>${esc(c.pinyin)}</small><br><small>${esc(c.level)} · ${esc(c.lesson)}</small></div>`).join('')||'<div class="item">No active practice characters.</div>';renderKnownList()}
function renderKnownList(){const known=allCards.filter(c=>safeGet(progressKey(c))==='known');window.__knownCardsForButtons=known;$('knownList').innerHTML=known.length?known.map((c,i)=>`<div class="item"><b>${esc(c.text)}</b> ✓<br><small>${esc(c.pinyin)}</small><br><button class="miniBtn unknownBtn" data-known-index="${i}">Unknown / practise again</button></div>`).join(''):'<div class="item">No known characters yet for this child and lesson.</div>'}
function next(delta){if(!cards.length)return;index=(index+delta+cards.length)%cards.length;revealed=false;render()}function mark(v){if(!cards.length)return;safeSet(progressKey(cards[index]),v);if(v==='known')buildCards(index);else next(1)}function showFeedback(label,type,alpha=1){const f=$('swipeFeedback');if(!f)return;f.textContent=label;f.className=`swipeFeedback show ${type}`;f.style.opacity=Math.max(.35,Math.min(alpha,.96))}function clearFeedback(){const f=$('swipeFeedback');if(f){f.className='swipeFeedback';f.style.opacity=''}}function animateDecision(v){if(!cards.length)return;const card=$('card'),right=v==='known';showFeedback(right?'Know':'Don’t know',right?'known':'again',.96);card.style.transition='transform .22s ease, opacity .22s ease';card.style.transform=`translateX(${right?115:-115}%) rotate(${right?8:-8}deg)`;suppressClick=true;setTimeout(()=>{mark(v);suppressClick=false},220)}function shuffle(){for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}isShuffled=true;index=0;revealed=false;render()}function bindSelect(id,handler){$(id).addEventListener('change',handler);$(id).addEventListener('input',handler)}
$('prev').onclick=()=>next(-1);$('next').onclick=()=>next(1);$('flip').onclick=()=>{revealed=!revealed;render()};$('know').onclick=()=>animateDecision('known');$('shuffle').onclick=shuffle;$('unshuffle').onclick=()=>orderCards(true);$('card').onclick=e=>{if(suppressClick||dragActive)return;if(e.target.closest('.navArrow'))return;if(!cards.length)return;revealed=!revealed;render()};
function onPointerStart(x,y){if(!cards.length)return;dragActive=true;startX=x;startY=y;currentDX=0;$('card').style.transition='none'}function onPointerMove(x,y){if(!dragActive)return;const dx=x-startX,dy=y-startY;if(Math.abs(dx)<Math.abs(dy))return;currentDX=dx;$('card').style.transform=`translateX(${dx}px) rotate(${Math.max(-8,Math.min(8,dx/22))}deg)`;const strength=Math.min(1,Math.abs(dx)/120);if(dx>18)showFeedback('Know','known',strength);else if(dx<-18)showFeedback('Don’t know','again',strength);else clearFeedback()}function onPointerEnd(){if(!dragActive)return;dragActive=false;const dx=currentDX;$('card').style.transition='transform .18s ease, opacity .18s ease';if(dx>90){animateDecision('known');return}if(dx<-90){animateDecision('again');return}$('card').style.transform='';clearFeedback()}
$('card').addEventListener('touchstart',e=>{if(e.target.closest('.navArrow'))return;const t=e.touches[0];onPointerStart(t.clientX,t.clientY)},{passive:true});$('card').addEventListener('touchmove',e=>{if(!dragActive)return;const t=e.touches[0];onPointerMove(t.clientX,t.clientY)},{passive:true});$('card').addEventListener('touchend',()=>onPointerEnd(),{passive:true});$('card').addEventListener('touchcancel',()=>onPointerEnd(),{passive:true});$('knownList').addEventListener('click',e=>{const btn=e.target.closest('.unknownBtn');if(!btn)return;const c=(window.__knownCardsForButtons||[])[Number(btn.dataset.knownIndex)];if(!c)return;safeSet(progressKey(c),'again');buildCards(index)});bindSelect('child',()=>{safeSet('hcl:app:child',$('child').value);restoreLessonForChild();buildCards(0)});bindSelect('level',()=>{populateLessons();isShuffled=false;buildCards(0)});bindSelect('lesson',()=>{isShuffled=false;buildCards(0)});document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next(1);if(e.key==='ArrowLeft')next(-1);if(e.key===' '){e.preventDefault();revealed=!revealed;render()}});let lastTouchEnd=0;document.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTouchEnd<=300)e.preventDefault();lastTouchEnd=now},{passive:false});(async function init(){testStorage();try{await loadSource();populateLevels();restoreSelections();buildCards(0)}catch(e){$('card').innerHTML=`<div class="error" style="margin:auto 0;">${esc(e.message)}</div>`;console.error(e)}})();
</script>
</body>
</html>
