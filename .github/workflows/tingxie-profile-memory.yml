name: Ting Xie profile memory

on:
  pull_request:
    paths:
      - 'tingxie/app-profile-memory.js'
      - 'tingxie/boot.js'
      - 'tingxie/index.html'
      - 'tingxie/tests/profile-memory.mjs'
      - '.github/workflows/tingxie-profile-memory.yml'
  push:
    branches:
      - main
    paths:
      - 'tingxie/app-profile-memory.js'
      - 'tingxie/boot.js'
      - 'tingxie/index.html'
      - 'tingxie/tests/profile-memory.mjs'
      - '.github/workflows/tingxie-profile-memory.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  profile-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null

      - name: Check JavaScript syntax
        run: |
          node --check tingxie/app-profile-memory.js
          node --check tingxie/boot.js
          node --check tingxie/tests/profile-memory.mjs

      - name: Test child profiles and saved lists
        run: node tingxie/tests/profile-memory.mjs

      - name: Upload profile-memory evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-profile-memory-evidence
          path: |
            /tmp/tingxie-profile-memory-pass.png
            /tmp/tingxie-profile-memory-migration-pass.png
            /tmp/tingxie-profile-memory-failure.png
            /tmp/tingxie-profile-memory-error.txt
          if-no-files-found: ignore

  verify-live-profile-memory:
    if: github.event_name == 'push'
    needs: profile-memory
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Mark public memory verification pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'tingxie-live-profile-memory',
              description: 'Testing deployed child profiles and saved lists',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install live-test browser
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null

      - name: Test public child-profile memory
        id: live_test
        continue-on-error: true
        env:
          TINGXIE_BASE_URL: https://edyeo82.github.io/chineseflashcard/tingxie/
        run: node tingxie/tests/profile-memory.mjs

      - name: Upload public memory evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-live-profile-memory-evidence
          path: |
            /tmp/tingxie-profile-memory-pass.png
            /tmp/tingxie-profile-memory-migration-pass.png
            /tmp/tingxie-profile-memory-failure.png
            /tmp/tingxie-profile-memory-error.txt
          if-no-files-found: ignore

      - name: Publish public memory result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.live_test.outcome }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'tingxie-live-profile-memory',
              description: passed ? 'Deployed child-profile memory passed' : 'Deployed child-profile memory failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Fail when public memory verification failed
        if: steps.live_test.outcome != 'success'
        run: exit 1
