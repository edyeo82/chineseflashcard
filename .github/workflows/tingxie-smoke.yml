name: Ting Xie smoke test

on:
  pull_request:
    paths:
      - 'tingxie/**'
      - '.github/workflows/tingxie-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'tingxie/**'
      - '.github/workflows/tingxie-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk python3
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null

      - name: Check JavaScript syntax
        run: |
          node --check tingxie/boot.js
          node --check tingxie/app-core.js
          node --check tingxie/app-ocr.js
          node --check tingxie/app-ocr-accuracy.js
          node --check tingxie/app-ocr-sentence-fix.js
          node --check tingxie/app-camera.js
          node --check tingxie/app-dictation.js
          node --check tingxie/app-marking.js
          node --check tingxie/app-init.js
          node --check tingxie/tests/smoke.mjs
          node --check tingxie/tests/ocr-accuracy.mjs
          node --check tingxie/tests/exact-photo-regression.mjs
          node --check tingxie/tests/live.mjs

      - name: Run full browser flow
        run: node tingxie/tests/smoke.mjs

      - name: Run exact OCR accuracy regression
        run: node tingxie/tests/ocr-accuracy.mjs

      - name: Run supplied-photo OCR regression
        run: node tingxie/tests/exact-photo-regression.mjs

      - name: Upload browser-test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-smoke-evidence
          path: |
            /tmp/tingxie-smoke-final.png
            /tmp/tingxie-smoke-failure.png
            /tmp/tingxie-real-ocr-failure.png
            /tmp/tingxie-smoke-error.txt
            /tmp/tingxie-accuracy-pass.png
            /tmp/tingxie-accuracy-failure.png
            /tmp/tingxie-accuracy-error.txt
            /tmp/tingxie-exact-photo-pass.png
            /tmp/tingxie-exact-photo-failure.png
            /tmp/tingxie-exact-photo-error.txt
          if-no-files-found: ignore

  verify-live-pages:
    if: github.event_name == 'push'
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Mark public-page verification pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'tingxie-live-pages',
              description: 'Testing deployed high-accuracy Ting Xie OCR',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install live-test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null

      - name: Test the public GitHub Pages app
        id: live_test
        continue-on-error: true
        run: node tingxie/tests/live.mjs

      - name: Upload public-page evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-live-pages-evidence
          path: |
            /tmp/tingxie-live-pass.png
            /tmp/tingxie-live-failure.png
            /tmp/tingxie-live-error.txt
          if-no-files-found: ignore

      - name: Publish public-page verification result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.live_test.outcome }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'tingxie-live-pages',
              description: passed ? 'Deployed 13-item OCR accuracy flow passed' : 'Deployed Ting Xie accuracy verification failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Fail when public-page verification failed
        if: steps.live_test.outcome != 'success'
        run: exit 1
