name: Ting Xie paste-list test

on:
  pull_request:
    paths:
      - 'tingxie/app-paste-list.js'
      - 'tingxie/boot.js'
      - 'tingxie/tests/paste-list.mjs'
      - 'tingxie/tests/live-paste-list.mjs'
      - '.github/workflows/tingxie-paste-list.yml'
  push:
    branches:
      - main
    paths:
      - 'tingxie/app-paste-list.js'
      - 'tingxie/boot.js'
      - 'tingxie/tests/paste-list.mjs'
      - 'tingxie/tests/live-paste-list.mjs'
      - '.github/workflows/tingxie-paste-list.yml'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  paste-flow:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install browser
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
      - name: Check JavaScript syntax
        run: |
          node --check tingxie/app-paste-list.js
          node --check tingxie/boot.js
          node --check tingxie/tests/paste-list.mjs
          node --check tingxie/tests/live-paste-list.mjs
      - name: Test ChatGPT paste to dictation
        run: node tingxie/tests/paste-list.mjs
      - name: Upload paste-flow evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-paste-list-evidence
          path: |
            /tmp/tingxie-paste-list-pass.png
            /tmp/tingxie-paste-list-failure.png
            /tmp/tingxie-paste-list-error.txt
          if-no-files-found: ignore

  verify-live-paste:
    if: github.event_name == 'push'
    needs: paste-flow
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mark public paste verification pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'tingxie-live-paste',
              description: 'Testing deployed ChatGPT paste-to-dictation flow',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install live-test browser
        run: |
          npm install --no-save --silent playwright@1.54.1
          npx playwright install --with-deps chromium >/dev/null
      - name: Test public GitHub Pages paste flow
        id: live_test
        continue-on-error: true
        run: node tingxie/tests/live-paste-list.mjs
      - name: Upload public paste evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tingxie-live-paste-evidence
          path: |
            /tmp/tingxie-live-paste-pass.png
            /tmp/tingxie-live-paste-failure.png
            /tmp/tingxie-live-paste-error.txt
          if-no-files-found: ignore
      - name: Publish public paste verification result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.live_test.outcome }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'tingxie-live-paste',
              description: passed ? 'Deployed paste-to-dictation flow passed' : 'Deployed paste-to-dictation flow failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
      - name: Fail when public paste verification failed
        if: steps.live_test.outcome != 'success'
        run: exit 1
